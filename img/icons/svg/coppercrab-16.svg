<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <rect x="0" y="0" width="16" height="16" rx="3" fill="#1b3d2a"/>
  <!-- antennae traces -->
  <line x1="5" y1="5" x2="2" y2="2" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="5" x2="14" y2="2" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- leg traces -->
  <line x1="4" y1="9" x2="1" y2="9" stroke="#b87333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="4" y1="12" x2="1" y2="12" stroke="#b87333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="12" y1="9" x2="15" y2="9" stroke="#b87333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="15" y2="12" stroke="#b87333" stroke-width="1.3" stroke-linecap="round"/>
  <!-- chip body -->
  <rect x="4" y="5" width="8" height="9" rx="1.5" fill="#243d2e" stroke="#b87333" stroke-width="1.3"/>
  <!-- LED eyes -->
  <circle cx="6" cy="4" r="1.5" fill="#00e676"/>
  <circle cx="10" cy="4" r="1.5" fill="#00e676"/>
</svg>
